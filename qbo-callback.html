<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookkeeper Assistant - OAuth Callback</title>
<style>body{font-family:system-ui,sans-serif;max-width:600px;margin:3rem auto;padding:0 1rem;line-height:1.6;color:#333}code{background:#f4f4f4;padding:2px 6px;border-radius:3px;font-size:0.95em;word-break:break-all}pre{background:#f4f4f4;padding:1rem;border-radius:6px;overflow-x:auto}.success{color:#16a34a}.error{color:#dc2626}</style>
</head>
<body>
<h2>Bookkeeper Assistant</h2>
<div id="result"></div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const realmId = params.get('realmId');
const error = params.get('error');
const el = document.getElementById('result');

if (error) {
  el.innerHTML = '<p class="error">Authorization failed: ' + error + '</p>';
} else if (code && realmId) {
  el.innerHTML = '<p class="success">Authorization successful!</p>' +
    '<p>Paste this into your terminal:</p>' +
    '<pre>' + code + ' ' + realmId + '</pre>' +
    '<p>Then you can close this tab.</p>';
} else {
  el.innerHTML = '<p class="error">Missing authorization parameters.</p>';
}
</script>
</body>
</html>
